<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>InclusãoIA - Login</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }
        
        .login-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 450px;
            overflow: hidden;
        }
        
        .login-header {
            background: linear-gradient(135deg, #4f46e5, #3b82f6);
            padding: 30px;
            text-align: center;
            color: white;
        }
        
        .login-header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .login-header p {
            opacity: 0.9;
            font-size: 14px;
        }
        
        .login-body {
            padding: 30px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #1e293b;
        }
        
        input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        
        input:focus {
            border-color: #3b82f6;
            outline: none;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #4f46e5, #3b82f6);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        .mensagem {
            margin-top: 15px;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            font-size: 14px;
        }
        
        .mensagem.erro {
            background: #fee2e2;
            color: #dc2626;
        }
        
        .mensagem.sucesso {
            background: #d4edda;
            color: #10b981;
        }
        
        .link-cadastro {
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e2e8f0;
        }
        
        .link-cadastro a {
            color: #3b82f6;
            text-decoration: none;
            font-weight: 600;
        }
        
        .link-cadastro a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>🎓 InclusãoIA</h1>
            <p>Plataforma de Apoio à Educação Inclusiva</p>
        </div>
        <div class="login-body">
            <form id="login-form">
                <div class="form-group">
                    <label for="email">📧 E-mail</label>
                    <input type="email" id="email" required placeholder="seu@email.com">
                </div>
                <div class="form-group">
                    <label for="senha">🔒 Senha</label>
                    <input type="password" id="senha" required placeholder="Digite sua senha">
                </div>
                <button type="submit">Entrar</button>
            </form>
            <div id="login-mensagem" class="mensagem"></div>
            <div class="link-cadastro">
                <p>Não tem uma conta? <a href="cadastro_perfil.html">Cadastre-se aqui</a></p>
            </div>
        </div>
    </div>

    <script type="module">
        import { supabase } from './js/supabase.js';

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;
            const msgDiv = document.getElementById('login-mensagem');
            
            msgDiv.className = 'mensagem';
            msgDiv.textContent = '⏳ Entrando...';
            
            const { data, error } = await supabase.auth.signInWithPassword({
                email: email,
                password: senha
            });
            
            if (error) {
                msgDiv.className = 'mensagem erro';
                msgDiv.textContent = '❌ ' + error.message;
                return;
            }
            
            if (data.user) {
                const { data: perfil, error: perfilError } = await supabase
                    .from('perfis_usuarios')
                    .select('tipo_perfil')
                    .eq('email', email)
                    .single();
                
                let tipoPerfil = 'visitante';
                if (perfil && perfil.tipo_perfil) {
                    tipoPerfil = perfil.tipo_perfil;
                    if (tipoPerfil === 'comunidade') tipoPerfil = 'visitante';
                }
                
                localStorage.setItem('perfil_usuario', tipoPerfil);
                localStorage.setItem('user_email', email);
                localStorage.setItem('user_id', data.user.id);
                
                if (tipoPerfil === 'professor') {
                    window.location.href = 'professor.html';
                } else if (tipoPerfil === 'mediador') {
                    window.location.href = 'mediador.html';
                } else {
                    window.location.href = 'comunidade.html';
                }
            }
        });
    </script>
</body>
</html>
