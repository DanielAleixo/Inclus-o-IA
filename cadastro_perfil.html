<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="css/style.css">
    <title>InclusãoIA - Cadastro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }
        
        .cadastro-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 500px;
            overflow: hidden;
        }
        
        .cadastro-header {
            background: linear-gradient(135deg, #4f46e5, #3b82f6);
            padding: 25px;
            text-align: center;
            color: white;
        }
        
        .cadastro-header h1 {
            font-size: 24px;
            margin-bottom: 8px;
        }
        
        .cadastro-header p {
            opacity: 0.9;
            font-size: 13px;
        }
        
        .cadastro-body {
            padding: 30px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #1e293b;
        }
        
        input, select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        
        input:focus, select:focus {
            border-color: #3b82f6;
            outline: none;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #4f46e5, #3b82f6);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        .mensagem {
            margin-top: 15px;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            font-size: 14px;
        }
        
        .mensagem.erro {
            background: #fee2e2;
            color: #dc2626;
        }
        
        .mensagem.sucesso {
            background: #d4edda;
            color: #10b981;
        }
        
        .link-login {
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e2e8f0;
        }
        
        .link-login a {
            color: #3b82f6;
            text-decoration: none;
            font-weight: 600;
        }
        
        .link-login a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="cadastro-container">
        <div class="cadastro-header">
            <h1>📝 Criar Nova Conta</h1>
            <p>Cadastre-se para acessar a plataforma</p>
        </div>
        <div class="cadastro-body">
            <form id="cadastro-form">
                <div class="form-group">
                    <label for="nome">👤 Nome Completo</label>
                    <input type="text" id="nome" required placeholder="Digite seu nome completo">
                </div>
                <div class="form-group">
                    <label for="email">📧 E-mail</label>
                    <input type="email" id="email" required placeholder="seu@email.com">
                </div>
                <div class="form-group">
                    <label for="senha">🔒 Senha</label>
                    <input type="password" id="senha" required minlength="6" placeholder="Mínimo 6 caracteres">
                </div>
                <div class="form-group">
                    <label for="confirmar_senha">🔒 Confirmar Senha</label>
                    <input type="password" id="confirmar_senha" required minlength="6" placeholder="Digite a senha novamente">
                </div>
                <div class="form-group">
                    <label for="tipo_perfil">🎭 Tipo de Perfil</label>
                    <select id="tipo_perfil" required>
                        <option value="professor">👨‍🏫 Professor Regente</option>
                        <option value="mediador">🤝 Mediador Escolar</option>
                        <option value="comunidade">👨‍👩‍👧 Comunidade (Pais/Responsáveis)</option>
                    </select>
                </div>
                <button type="submit">✅ Cadastrar</button>
            </form>
            <div id="msg" class="mensagem"></div>
            <div class="link-login">
                <p>Já tem uma conta? <a href="index.html">Faça login</a></p>
            </div>
        </div>
    </div>

    <script type="module">
        import { supabase } from './js/supabase.js';

        document.getElementById('cadastro-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const nome = document.getElementById('nome').value;
            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;
            const confirmarSenha = document.getElementById('confirmar_senha').value;
            const tipo_perfil = document.getElementById('tipo_perfil').value;
            const msg = document.getElementById('msg');
            
            if (senha !== confirmarSenha) {
                msg.className = 'mensagem erro';
                msg.textContent = '❌ As senhas não coincidem!';
                return;
            }
            
            msg.className = 'mensagem';
            msg.textContent = '⏳ Criando conta...';
            
            const { data: authData, error: authError } = await supabase.auth.signUp({
                email: email,
                password: senha,
            });

            if (authError) {
                msg.className = 'mensagem erro';
                msg.textContent = '❌ ' + authError.message;
                return;
            }

            const { error: dbError } = await supabase
                .from('perfis_usuarios')
                .insert([{ email, nome, tipo_perfil }]);

            if (dbError) {
                msg.className = 'mensagem erro';
                msg.textContent = '❌ Erro ao salvar perfil: ' + dbError.message;
            } else {
                msg.className = 'mensagem sucesso';
                msg.textContent = '✅ Conta criada com sucesso! Redirecionando para o login...';
                
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 2000);
            }
        });
    </script>
</body>
</html>
